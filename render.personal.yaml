# Render blueprint — private personal instance (attach a persistent disk for DATA_DIR)
services:
  - type: web
    name: board-game-referee-personal
    runtime: docker
    plan: free
    healthCheckPath: /api/health
    disk:
      name: referee-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DEMO_MODE
        value: "0"
      - key: PRESEED_DEMO_RULEBOOK
        value: "0"
      - key: OCR_FALLBACK
        value: "1"
      - key: DATA_DIR
        value: /data
      - key: RETRIEVAL_TELEMETRY
        value: "0"
      - key: RULING_FEEDBACK
        value: "0"
      - key: RATE_LIMIT_ENABLED
        value: "1"
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: API_ACCESS_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false
