# Render blueprint — recommended hybrid deploy (demo + family access + disk)
# See docs/DEPLOYMENT.md. Alternatives: render.demo.yaml, render.personal.yaml
services:
  - type: web
    name: board-game-referee
    runtime: docker
    plan: free
    healthCheckPath: /api/health
    disk:
      name: referee-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DEMO_MODE
        value: "1"
      - key: PRESEED_DEMO_RULEBOOK
        value: "1"
      - key: OCR_FALLBACK
        value: "1"
      - key: DATA_DIR
        value: /data
      - key: RETRIEVAL_TELEMETRY
        value: "0"
      - key: RULING_FEEDBACK
        value: "0"
      - key: RATE_LIMIT_ENABLED
        value: "1"
      - key: RATE_LIMIT_LLM_MAX
        value: "15"
      - key: RATE_LIMIT_EXPENSIVE_MAX
        value: "5"
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: API_ACCESS_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false
